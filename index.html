<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페인 잔존량 계산기</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .box {
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
      background: #fafafa;
    }
    label { display: block; margin-top: 14px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 4px;
    }
    button {
      margin-top: 14px;
      padding: 10px 16px;
      font-size: 15px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: #222;
      color: white;
    }
    button.secondary {
      background: #666;
      margin-right: 8px;
    }
    button.danger {
      background: #9b1c1c;
      padding: 8px 12px;
      margin-top: 8px;
    }
    .dose-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 12px;
      margin-top: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
    }
    .dose-row label { margin-top: 0; }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 10px;
      background: white;
      border: 1px solid #ddd;
      font-size: 18px;
    }
    .ok { color: #0a7a2f; }
    .no { color: #b00020; }
    .note { color: #555; font-size: 14px; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 15px;
    }
    th, td {
      border-bottom: 1px solid #ddd;
      padding: 8px;
      text-align: right;
    }
    input[readonly] {
  background-color: #f5f5f5;
  color: #888;
  border: 1px solid #ddd;
  cursor: not-allowed;
}
    th:first-child, td:first-child { text-align: center; }
  </style>
</head>
<body>
  <h1 id="title">카페인 잔존량 계산기</h1>
  <p class="note">n번 섭취해도 계산됩니다. 각 섭취 시간과 섭취량을 입력하면 취침 시 총 잔존량을 계산합니다.</p>

  <div class="box">
    <label>반감기, 시간</label>
    <input id="halfLife" type="number" value="5" readonly />

    <label>언제 자나요? (24시간 형식으로 입력해 주세요. 예: 오후 5시 → 17, 오전 1시 → 1)</label>
    <input id="bedtime" type="number" min="0" max="24" step="0.1" placeholder="예: 24" />

    <label>허용 잔존량 기준, mg</label>
    <input id="threshold" type="number" value="57.4" readonly />
  </div>

  <div class="box">
    <p>카페인 섭취 기록 (24시간 형식으로 입력해 주세요. 예: 오후 5시 → 17, 오전 1시 → 1)</p>
    <div id="doseList"></div>
    <button class="secondary" onclick="addDose()">섭취 추가</button>
    <button class="secondary" onclick="resetDoses()">초기화</button>
    <button onclick="calculate()">계산하기</button>

    <div id="result" class="result">입력 후 계산하기를 눌러 주세요.</div>
  </div>

  <div class="box">
    <p>사용한 식</p>
    <p><code>총 잔존량 = Σ [섭취량ᵢ × (1/2)^((취침 시간 - 섭취 시간ᵢ)/반감기)]</code></p>
    <p class="note">예: 100 mg을 14시에 섭취하고 24시에 자며 반감기가 5시간이면, 잔존량은 100 × (1/2)^((24-14)/5) = 25 mg입니다.</p>
  </div>

  <script>
    const doseList = document.getElementById('doseList');

    function addDose(time = '', amount = 100) {
      const index = doseList.children.length + 1;
      const row = document.createElement('div');
      row.className = 'dose-row';
      row.innerHTML = `
        <label>${index}. 언제 먹었나요?
          <input class="time" type="number" min="0" max="24" step="0.1" value="${time}" placeholder="예: 14" />
        </label>
        <label>얼마나 먹었나요? (mg)
          <input class="amount" type="number" min="0" step="1" value="${amount}" placeholder="예: 100" />
        </label>
        <button class="danger" onclick="removeDose(this)">삭제</button>
      `;
      doseList.appendChild(row);
      renumberRows();
    }

    function removeDose(button) {
      button.parentElement.remove();
      renumberRows();
    }

    function renumberRows() {
      [...doseList.children].forEach((row, i) => {
        row.querySelector('label').firstChild.textContent = `${i + 1}. 언제 먹었나요?`;
      });
    }

    function normalizeTime(time) {
  if (time >= 0 && time < 5) {
    return time + 24;
  }
  return time;
}

function remainingAmount(amount, intakeTime, bedtime, halfLife) {
  const elapsed = bedtime - intakeTime;
  if (elapsed < 0) return NaN;
  return amount * Math.pow(0.5, elapsed / halfLife);
}

    function calculate() {
      const halfLife = Number(document.getElementById('halfLife').value);
      const bedtime = Number(document.getElementById('bedtime').value);
      const threshold = Number(document.getElementById('threshold').value);
      const result = document.getElementById('result');
      const rows = [...doseList.children];

      if (rows.length === 0) {
        result.innerHTML = '섭취 기록을 1개 이상 추가해 주세요.';
        return;
      }
      if ([halfLife, bedtime, threshold].some(x => Number.isNaN(x))) {
        result.innerHTML = '반감기, 취침 시간, 기준값을 숫자로 입력해 주세요.';
        return;
      }
      if (halfLife <= 0 || threshold < 0) {
        result.innerHTML = '반감기는 0보다 커야 하고, 기준값은 0 이상이어야 합니다.';
        return;
      }

      let total = 0;
      const details = [];

      for (let i = 0; i < rows.length; i++) {
        const time = Number(rows[i].querySelector('.time').value);
        const amount = Number(rows[i].querySelector('.amount').value);

        if (Number.isNaN(time) || Number.isNaN(amount)) {
          result.innerHTML = `${i + 1}번째 섭취 시간과 섭취량을 숫자로 입력해 주세요.`;
          return;
        }
        if (time < 0 || time > 24 || bedtime < 0 || bedtime > 24) {
          result.innerHTML = '시간은 0~24 사이로 입력해 주세요.';
          return;
        }
        if (time > bedtime) {
          result.innerHTML = `${i + 1}번째 섭취 시간이 취침 시간보다 늦습니다. 같은 날 기준으로 다시 입력해 주세요.`;
          return;
        }
        if (amount < 0) {
          result.innerHTML = '섭취량은 0 이상이어야 합니다.';
          return;
        }

        const elapsed = bedtime - time;
        const remaining = remainingAmount(amount, time, bedtime, halfLife);
        total += remaining;
        details.push({ index: i + 1, time, amount, elapsed, remaining });
      }

      const pass = total <= threshold;
      const tableRows = details.map(d => `
        <tr>
          <td>${d.index}</td>
          <td>${d.time.toFixed(1)}</td>
          <td>${d.amount.toFixed(1)}</td>
          <td>${d.elapsed.toFixed(1)}</td>
          <td>${d.remaining.toFixed(1)}</td>
        </tr>
      `).join('');

      result.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>번호</th>
              <th>언제 먹었나요?</th>
              <th>얼마나 먹었나요? (mg)</th>
              <th>경과 시간</th>
              <th>잔존량, mg</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
        <br>
        총 잔존량: ${total.toFixed(1)} mg<br>
        기준: ${threshold.toFixed(1)} mg 이하<br><br>
        판정: <span class="${pass ? 'ok' : 'no'}">${pass ? 'O, 기준 이하(수면에 영향을 주지 않습니다.)' : 'X, 기준 초과(수면에 영향을 줄 수 있습니다.)'}</span>
      `;
    }

    resetDoses();
 // ===== 모바일 이스터에그 =====

const title = document.getElementById('title');

let tapCount = 0;
let tapTimer;

title.addEventListener('click', () => {
  tapCount++;

  clearTimeout(tapTimer);

  tapTimer = setTimeout(() => {
    tapCount = 0;
  }, 1500);

  if (tapCount >= 5) {
    activateEasterEgg();
    tapCount = 0;
  }
});

function activateEasterEgg() {

  // ===== 1. 각성 모드 =====

  document.body.style.background =
    'linear-gradient(135deg, #120f1f, #1b1333)';

  document.body.style.color = '#7CFFB2';

  document.querySelectorAll('.box').forEach(box => {
    box.style.background = '#1e1a2e';
    box.style.border = '1px solid #7CFFB2';
    box.style.boxShadow = '0 0 14px rgba(124,255,178,0.25)';
  });

  // ===== 2. 커피 비 =====

  for (let i = 0; i < 25; i++) {

    const coffee = document.createElement('div');

    coffee.textContent = '☕';

    coffee.style.position = 'fixed';
    coffee.style.left = Math.random() * 100 + 'vw';
    coffee.style.top = '-50px';
    coffee.style.fontSize = (20 + Math.random() * 20) + 'px';
    coffee.style.zIndex = '9999';
    coffee.style.pointerEvents = 'none';

    document.body.appendChild(coffee);

    coffee.animate(
      [
        { transform: 'translateY(0) rotate(0deg)' },
        {
          transform:
            `translateY(110vh) rotate(${Math.random() * 360}deg)`
        }
      ],
      {
        duration: 2000 + Math.random() * 2000,
        easing: 'linear'
      }
    );

    setTimeout(() => coffee.remove(), 4000);
  }

  // ===== 3. 랜덤 드립 =====

  const truths = [
    '☕ 카페인이 당신보다 안 자고 있습니다.',
    '😵 오늘도 수면은 패배했습니다.',
    '🛌 이제 폰 내려놓고 잘 시간입니다.',
    '💀 심장이 F1 엔진처럼 뛰고 있습니다.',
    '📉 생산성보다 수면이 중요합니다.',
    '⚡ 인간 각성 한계를 돌파했습니다.'
  ];

  const msg =
    truths[Math.floor(Math.random() * truths.length)];

  setTimeout(() => {
    alert(msg);
  }, 300);

  // ===== 4. 고양이 등장 =====

  const oldCat = document.getElementById('secret-cat');

  if (oldCat) oldCat.remove();

  const cat = document.createElement('img');

  cat.id = 'secret-cat';

  cat.src = 'https://cataas.com/cat';

  cat.style.position = 'fixed';
  cat.style.bottom = '12px';
  cat.style.right = '12px';
  cat.style.width = '120px';
  cat.style.borderRadius = '14px';
  cat.style.boxShadow = '0 4px 14px rgba(0,0,0,0.35)';
  cat.style.zIndex = '9999';

  cat.style.transform = 'translateY(20px)';
  cat.style.opacity = '0';

  cat.style.transition =
    'all 0.5s ease';

  document.body.appendChild(cat);

  setTimeout(() => {
    cat.style.transform = 'translateY(0)';
    cat.style.opacity = '1';
  }, 50);
}
  </script>
</body>
</html>
