<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>록 리듬게임</title>

<style>
body{
    margin:0;
    background:#222;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

#score{
    font-size:24px;
    margin-top:20px;
}

#combo{
    font-size:18px;
}

#beat{
    font-size:22px;
    color:#00ffcc;
    margin:10px;
}

#gameArea{
    width:400px;
    height:600px;
    margin:20px auto;
    background:#333;
    position:relative;
    overflow:hidden;
    border-radius:10px;
}

#judgeLine{
    position:absolute;
    bottom:80px;
    width:100%;
    height:4px;
    background:red;
}

.note{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    background:gold;
    cursor:pointer;
}

.effect{
    position:absolute;
    width:50px;
    height:50px;
    border:4px solid gold;
    border-radius:50%;
    pointer-events:none;
    animation:pop 0.3s forwards;
}

@keyframes pop{

    from{
        transform:scale(0.5);
        opacity:1;
    }

    to{
        transform:scale(2);
        opacity:0;
    }

}

button{
    padding:10px 20px;
    font-size:18px;
}
</style>

</head>

<body>

<div id="score">점수 : 0</div>
<div id="combo">콤보 : 0</div>
<div id="beat">박 : 1</div>

<div id="gameArea">
    <div id="judgeLine"></div>
</div>

<button id="startBtn">게임 시작</button>

<script>

const gameArea = document.getElementById("gameArea");
const scoreDiv = document.getElementById("score");
const comboDiv = document.getElementById("combo");
const beatDiv = document.getElementById("beat");
const startBtn = document.getElementById("startBtn");

const lanes = [25,125,225,325];
const judgeY = 520;

const bpm = 150;
const beatTime = 60000 / bpm; // 400ms

let notes = [];

let score = 0;
let combo = 0;
let beat = 0;

let spawnTimer;

function updateUI(){

    scoreDiv.innerText = "점수 : " + score;
    comboDiv.innerText = "콤보 : " + combo;
    beatDiv.innerText = "박 : " + beat;

}

function createEffect(x,y){

    const effect = document.createElement("div");

    effect.className = "effect";

    effect.style.left = x + "px";
    effect.style.top = y + "px";

    gameArea.appendChild(effect);

    setTimeout(()=>{
        effect.remove();
    },300);

}

function removeNote(note){

    if(note.parentNode){
        note.remove();
    }

    notes = notes.filter(n=>n!==note);

}

function createNote(){

    const note = document.createElement("div");

    note.className = "note";

    note.dataset.y = -50;

    const lane = lanes[Math.floor(Math.random()*lanes.length)];

    note.style.left = lane + "px";
    note.style.top = "-50px";

    gameArea.appendChild(note);

    notes.push(note);

    note.onclick = function(){

        if(note.dataset.removed==="true") return;

        note.dataset.removed="true";

        const y = Number(note.dataset.y);
        const diff = Math.abs(judgeY-y);

        if(diff<20){

            score += 300;
            combo++;

        }else if(diff<40){

            score += 150;
            combo++;

        }else{

            combo = 0;

        }

        createEffect(note.offsetLeft,note.offsetTop);

        updateUI();

        removeNote(note);

    };

}

function gameLoop(){

    for(let i=notes.length-1;i>=0;i--){

        const note = notes[i];

        if(note.dataset.removed==="true") continue;

        let y = Number(note.dataset.y);

        y += 4;

        note.dataset.y = y;

        note.style.top = y + "px";

        if(y>600){

            combo = 0;
            updateUI();

            note.dataset.removed="true";

            removeNote(note);

        }

    }

    requestAnimationFrame(gameLoop);

}

function startGame(){

    score = 0;
    combo = 0;
    beat = 0;

    updateUI();

    startBtn.disabled = true;

    spawnTimer = setInterval(()=>{

        beat = (beat % 4) + 1;

        updateUI();

        createNote();

    },beatTime);

    setTimeout(endGame,30000);

}

function endGame(){

    clearInterval(spawnTimer);

    notes.forEach(n=>n.remove());

    notes = [];

    startBtn.disabled = false;

    alert("수고했어 린느!\n점수 : " + score);

}

startBtn.onclick = startGame;

requestAnimationFrame(gameLoop);

</script>

</body>
</html>
